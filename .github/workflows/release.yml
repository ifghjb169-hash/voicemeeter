name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows executable
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\build.ps1

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath .\bin\SoundDeviceSwitcher.exe -Destination .\dist\SoundDeviceSwitcher.exe -Force
          Copy-Item -LiteralPath .\README.md -Destination .\dist\README.md -Force
          Compress-Archive -LiteralPath .\dist\SoundDeviceSwitcher.exe, .\dist\README.md -DestinationPath .\dist\SoundDeviceSwitcher-windows-x64.zip -Force
          Get-FileHash .\dist\SoundDeviceSwitcher.exe, .\dist\SoundDeviceSwitcher-windows-x64.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path -Leaf $_.Path)" } |
            Set-Content -Path .\dist\SHA256SUMS.txt -Encoding ascii

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
